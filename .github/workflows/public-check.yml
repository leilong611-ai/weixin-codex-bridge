name: public-check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  public-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run privacy check
        run: npm run public-check
