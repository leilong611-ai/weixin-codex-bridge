  <text x="450" y="268" fill="#E5E7EB" font-size="22" font-family="Inter, Arial, sans-serif">What happens during login</text>
  <text x="450" y="320" fill="#CBD5E1" font-size="20" font-family="Inter, Arial, sans-serif">1. Fetch QR from the Weixin bot API</text>
  <text x="450" y="362" fill="#CBD5E1" font-size="20" font-family="Inter, Arial, sans-serif">2. Render QR in terminal and save .local/login-qr.png</text>
  <text x="450" y="404" fill="#CBD5E1" font-size="20" font-family="Inter, Arial, sans-serif">3. Poll login status until confirmed</text>
  <text x="450" y="446" fill="#CBD5E1" font-size="20" font-family="Inter, Arial, sans-serif">4. Persist bot token and account metadata locally</text>

  <rect x="450" y="498" width="640" height="88" rx="14" fill="#0F172A"/>
  <text x="478" y="538" fill="#A7F3D0" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">STATUS=wait   STATUS=scaned   STATUS=confirmed</text>
  <text x="478" y="570" fill="#E5E7EB" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">The user must confirm inside Weixin after scanning.</text>

  <text x="96" y="620" fill="#94A3B8" font-size="18" font-family="Inter, Arial, sans-serif">Sanitized illustrative screenshot for the public repository</text>
